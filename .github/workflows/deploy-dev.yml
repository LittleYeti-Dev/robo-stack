###############################################################################
# Deploy to Dev — Robo Stack
# Triggered on every push to main. Builds container images, pushes to GHCR,
# and deploys to the dev K8s cluster via kustomize.
###############################################################################
name: Deploy to Dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/claude-proxy
  NAMESPACE: robo-stack

jobs:
  # ---------------------------------------------------------------------------
  # Build, push, and deploy
  # ---------------------------------------------------------------------------
  deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev

    steps:
      # -- Checkout -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Docker Buildx ------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -- GHCR Login ---------------------------------------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- Build & Push --------------------------------------------------------
      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # -- Create GitHub Deployment record ------------------------------------
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'dev',
              auto_merge: false,
              required_contexts: [],
              description: `Dev deploy main-${context.sha.substring(0, 7)}`
            });
            core.setOutput('deployment_id', deployment.data.id);

      # -- Configure kubectl --------------------------------------------------
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # -- Deploy via kustomize -----------------------------------------------
      - name: Deploy to dev cluster
        run: |
          cd k8s/overlays/dev/
          kustomize edit set image claude-proxy=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
          kustomize build . | kubectl apply -f -

      # -- Deployment metadata ConfigMap --------------------------------------
      - name: Create deployment metadata ConfigMap
        run: |
          kubectl create configmap deployment-metadata \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=deployed-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --from-literal=image-tag="main-${{ github.sha }}" \
            --from-literal=git-sha="${{ github.sha }}" \
            --from-literal=deployed-by="${{ github.actor }}" \
            --from-literal=environment="dev" \
            --dry-run=client -o yaml | kubectl apply -f -

      # -- Wait for rollout ---------------------------------------------------
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/claude-proxy \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      # -- Smoke test ----------------------------------------------------------
      - name: Smoke test health endpoint
        run: |
          SERVICE_URL=$(kubectl get svc claude-proxy -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$SERVICE_URL" ]; then
            SERVICE_URL=$(kubectl get svc claude-proxy -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          fi
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${SERVICE_URL}/health" || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      # -- Mark deployment successful -----------------------------------------
      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Dev deployment succeeded',
              environment_url: 'https://dev.robo-stack.internal'
            });

  # ---------------------------------------------------------------------------
  # Rollback on failure
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    timeout-minutes: 5

    steps:
      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Rollback deployment
        run: |
          echo "Rolling back claude-proxy in ${{ env.NAMESPACE }}..."
          kubectl rollout undo deployment/claude-proxy -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/claude-proxy -n ${{ env.NAMESPACE }} --timeout=120s
          echo "Rollback complete."

      - name: Mark deployment failed
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'dev',
              per_page: 1
            });
            if (deployments.data.length > 0) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployments.data[0].id,
                state: 'failure',
                description: 'Dev deployment failed — automatic rollback executed'
              });
            }
