name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**/Dockerfile'
      - 'k8s/**/*.py'
      - 'k8s/**/*.js'
      - 'k8s/**/*.ts'
      - 'k8s/**/requirements.txt'
      - 'k8s/**/package.json'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**/Dockerfile'
      - 'k8s/**/*.py'
      - 'k8s/**/*.js'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/robo-stack

jobs:
  detect-images:
    name: Detect changed Dockerfiles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_images: ${{ steps.detect.outputs.has_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Dockerfiles to build
        id: detect
        run: |
          # Find all Dockerfiles under k8s/
          DOCKERFILES=$(find k8s -name Dockerfile -type f 2>/dev/null || true)

          if [ -z "$DOCKERFILES" ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build matrix JSON
          MATRIX='{"include":['
          FIRST=true
          for df in $DOCKERFILES; do
            DIR=$(dirname "$df")
            NAME=$(basename "$DIR")
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX="$MATRIX,"
            fi
            MATRIX="$MATRIX{\"context\":\"$DIR\",\"name\":\"$NAME\"}"
          done
          MATRIX="$MATRIX]}"

          echo "has_images=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Detected images: $MATRIX"

  build-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: detect-images
    if: needs.detect-images.outputs.has_images == 'true'
    strategy:
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        if: github.event_name == 'push'
        run: |
          echo "### 🐳 Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
