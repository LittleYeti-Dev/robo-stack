name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Weekly scan on Wednesday night at 2 AM UTC
    - cron: '0 2 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            report.json
            report.sarif
          retention-days: 30

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      contains(github.event.pull_request.files.*.filename, 'Dockerfile') ||
      contains(github.event.pull_request.files.*.filename, '.dockerignore') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t robo-stack:latest .
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: robo-stack:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: |
          syft . -o cyclonedx-json > sbom-cyclonedx.json || true

      - name: Generate SBOM (SPDX)
        run: |
          syft . -o spdx-json > sbom-spdx.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 30

  security-status:
    name: Security Status Check
    runs-on: ubuntu-latest
    needs:
      - secret-detection
    if: always()

    steps:
      - name: Fail if secrets were detected
        if: needs.secret-detection.result == 'failure'
        run: |
          echo "❌ Security scan failed: secrets detected in code"
          exit 1

      - name: Security scan passed
        if: success()
        run: |
          echo "✅ Security scan completed successfully"
