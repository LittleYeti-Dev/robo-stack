apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    rule_files:
      - "/etc/prometheus/alert-rules.yml"

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter.monitoring.svc:9100"]

      - job_name: "kubernetes-apiservers"
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      - job_name: "claude-proxy"
        metrics_path: /metrics
        static_configs:
          - targets: ["claude-proxy.robo-stack.svc:8080"]

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

  alert-rules.yml: |
    groups:
      - name: robo-stack-alerts
        rules:
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Pod has restarted {{ $value }} times in the last 15 minutes."

          - alert: HighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node CPU usage above 85%"
              description: "Node CPU usage is {{ $value }}% for more than 10 minutes."

          - alert: HighMemory
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node memory usage above 90%"
              description: "Node memory usage is {{ $value }}% for more than 5 minutes."

          - alert: DiskAlmostFull
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is almost full"
              description: "PVC usage is {{ $value }}%."

          - alert: ClaudeProxyDown
            expr: up{job="claude-proxy"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Claude proxy is down"
              description: "Claude proxy has been unreachable for more than 2 minutes."

          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{job="claude-proxy",code=~"5.."}[5m]))
                /
                sum(rate(http_requests_total{job="claude-proxy"}[5m]))
              ) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx error rate on Claude proxy"
              description: "5xx error rate is {{ $value }}% over the last 5 minutes."

          - alert: APITokenBurn
            expr: increase(claude_proxy_tokens_used_total[1h]) > 100000
            for: 0m
            labels:
              severity: info
            annotations:
              summary: "High API token burn rate"
              description: "{{ $value }} tokens consumed in the last hour."
