###############################################################################
# Robo Stack — Prometheus Security Hardening
#
# 1. Deployment with restricted SecurityContext (runAsNonRoot, readOnlyRootFS)
# 2. ConfigMap ensuring no remote_write config
# 3. Web config for basic auth on admin/lifecycle endpoints
#
# Apply: kubectl apply -f k8s/hardening/prometheus-security.yaml
###############################################################################

---
###############################################################################
# Prometheus web config — basic auth for admin endpoints
#
# The bcrypt hash below is a placeholder. Generate a real one:
#   htpasswd -nBC 10 admin
# Then base64-encode the file content or use a Secret instead.
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-web-config
  namespace: robo-stack-prod
  labels:
    app: prometheus
    app.kubernetes.io/part-of: robo-stack
    config-type: hardening
type: Opaque
stringData:
  web.yml: |
    # Basic auth for admin endpoints (/-/reload, /-/quit, /api/v1/admin/*)
    basic_auth_users:
      # IMPORTANT: Replace this bcrypt hash with a real one.
      # Generate: htpasswd -nBC 10 admin
      admin: "$2y$10$PLACEHOLDER_REPLACE_WITH_REAL_BCRYPT_HASH"

---
###############################################################################
# Prometheus ConfigMap — core config with NO remote_write
#
# This config explicitly omits remote_write to prevent data exfiltration.
# If remote_write is needed in the future, it must go through a security review.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-security-config
  namespace: robo-stack-prod
  labels:
    app: prometheus
    app.kubernetes.io/part-of: robo-stack
    config-type: hardening
data:
  prometheus-security.yml: |
    # ===========================================================================
    # Prometheus Security Configuration Overlay
    # Applied alongside the main prometheus.yml
    #
    # SECURITY CONTROLS:
    #   - NO remote_write (data stays local)
    #   - NO remote_read from untrusted sources
    #   - Scrape interval aligned with resource budget
    #   - TLS verification enabled for all HTTPS targets
    # ===========================================================================

    global:
      scrape_interval: 30s
      scrape_timeout: 10s
      evaluation_interval: 30s

    # EXPLICITLY NO remote_write SECTION
    # remote_write: []  # Intentionally absent — do not add without security review

    # EXPLICITLY NO remote_read SECTION
    # remote_read: []   # Intentionally absent — do not add without security review

---
###############################################################################
# Prometheus Deployment — hardened SecurityContext
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: robo-stack-prod
  labels:
    app: prometheus
    app.kubernetes.io/part-of: robo-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/part-of: robo-stack
    spec:
      # -----------------------------------------------------------------------
      # Pod-level security context
      # -----------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534    # nobody
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: prometheus
      automountServiceAccountToken: true

      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=10GB"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.config.file=/etc/prometheus/web.yml"
            # Disable admin API by default (lifecycle endpoints still need --web.enable-lifecycle)
            # Only enable if needed for reload: "--web.enable-lifecycle"
            # Do NOT enable: "--web.enable-admin-api"
          ports:
            - containerPort: 9090
              name: http
              protocol: TCP

          # -----------------------------------------------------------------
          # Container-level security context (restricted PSS compliant)
          # -----------------------------------------------------------------
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # -----------------------------------------------------------------
          # Resource limits
          # -----------------------------------------------------------------
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          # -----------------------------------------------------------------
          # Probes
          # -----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

          # -----------------------------------------------------------------
          # Volume mounts
          # -----------------------------------------------------------------
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-security-config
              mountPath: /etc/prometheus/prometheus-security.yml
              subPath: prometheus-security.yml
              readOnly: true
            - name: web-config
              mountPath: /etc/prometheus/web.yml
              subPath: web.yml
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp

      # -----------------------------------------------------------------------
      # Volumes
      # -----------------------------------------------------------------------
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-security-config
          configMap:
            name: prometheus-security-config
        - name: web-config
          secret:
            secretName: prometheus-web-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
