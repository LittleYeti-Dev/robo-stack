apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-proxy
  labels:
    app: claude-proxy
    app.kubernetes.io/part-of: robo-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-proxy
  template:
    metadata:
      labels:
        app: claude-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: claude-proxy
          image: ghcr.io/littleyeti-dev/robo-stack/claude-proxy:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: claude-proxy-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
