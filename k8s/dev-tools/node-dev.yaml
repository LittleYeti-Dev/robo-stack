---
# S2.4: Node.js dev environment on K3s
# Long-running container with Node 20 + TypeScript for development
# Access via code-server terminal or: kubectl exec -it -n robo-stack deploy/node-dev -- bash

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: node-dev-data
  namespace: robo-stack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-dev
  namespace: robo-stack
  labels:
    app: node-dev
    sprint: "2"
    story: s2.4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-dev
  template:
    metadata:
      labels:
        app: node-dev
    spec:
      containers:
        - name: node-dev
          image: node:20-bookworm
          command: ["sleep", "infinity"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    npm install -g typescript ts-node @types/node 2>/dev/null || true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: node-dev-data
